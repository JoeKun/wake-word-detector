#---------------------------------------------------------------
# Build options
#---------------------------------------------------------------

[build]
# Default target set to the match the Cortex-M33 in the RP2350
# for a Raspberry Pi Pico 2 in ARM mode.
target = "thumbv8m.main-none-eabihf"

# Alternative for the Hazard 3 RISC-V cores in the RP2350
# for a Raspberry Pi Pico 2 in RISC-V mode.
# target = "riscv32imac-unknown-none-elf"

# Alternative for the Cortex-M0+ in the RP2040 for a Raspberry Pi Pico.
# target = "thumbv6m-none-eabi"


#---------------------------------------------------------------
# Configuration for Raspberry Pi Pico 2 (RP2350) in ARM mode
#---------------------------------------------------------------

# This is the hard-float ABI for ARM mode with the Cortex-M33
# in the RP2350.
#
# The FPU is enabled by default, and float function arguments use FPU
# registers.
[target.thumbv8m.main-none-eabihf]

# Pass some extra options to `rustc`, some of which get passed on
# to the linker.
#
# * linker argument `--nmagic` turns off page alignment of sections
#   (which saves flash space).
# * linker argument `-Tlink.x` tells the linker to use `link.x`
#   as a linker script.
#   This is usually provided by the `cortex-m-rt` crate, and by default
#   the version in that crate will include a file called `memory.x`
#   which describes the particular memory layout for your specific chip.
# * linker argument `-Tdefmt.x` also tells the linker to use `defmt.x`
#   as a secondary linker script.
#   This is required to make `defmt_rtt` work.
rustflags = [
    "-C", "link-arg=--nmagic",
    "-C", "link-arg=-Tlink.x",
    "-C", "link-arg=-Tdefmt.x",
    "-C", "target-cpu=cortex-m33",
]

# Use `probe-rs` for running the executable on the microcontroller.
runner = "probe-rs run --chip ${CHIP} --protocol swd"

# Alternative to use `picotool` for loading.
#
# Load an elf, skipping unchanged flash sectors, verify it, and execute it.
#runner = "${PICOTOOL_PATH} load -u -v -x -t elf"


#---------------------------------------------------------------
# Configuration for Raspberry Pi Pico 2 (RP2350) in RISC-V mode
#---------------------------------------------------------------

# This is the soft-float ABI for RISC-V mode with the
# Hazard 3 RISC-V cores in the RP2350
#
# Hazard 3 does not have an FPU and so float function arguments
# use integer registers.
[target.riscv32imac-unknown-none-elf]

# Pass some extra options to `rustc`, some of which get passed on
# to the linker.
#
# * linker argument `--nmagic` turns off page alignment of sections
#   (which saves flash space).
# * linker argument -Trp235x_riscv.x also tells the linker to use
#   `rp235x_riscv.x` as a linker script. This adds in RP2350
#   RISC-V specific things that the `riscv-rt` crate’s `link.x`
#   requires and then includes `link.x` automatically.
#   This is the reverse of how we do it on Cortex-M.
# * linker argument `-Tdefmt.x` also tells the linker to use `defmt.x`
#   as a secondary linker script.
#   This is required to make `defmt_rtt` work.
rustflags = [
    "-C", "link-arg=--nmagic",
    "-C", "link-arg=-Trp2350_riscv.x",
    "-C", "link-arg=-Tdefmt.x",
]

# Use `probe-rs` for running the executable on the microcontroller.
runner = "probe-rs run --chip ${CHIP} --protocol swd"

# Alternative to use `picotool` for loading.
#
# Load an elf, skipping unchanged flash sectors, verify it, and execute it.
#runner = "${PICOTOOL_PATH} load -u -v -x -t elf"


#---------------------------------------------------------------
# Configuration for Raspberry Pi Pico (RP2040)
#---------------------------------------------------------------

[target.thumbv6m-none-eabi]

# Pass some extra options to `rustc`, some of which get passed on
# to the linker.
#
# * linker argument `--nmagic` turns off page alignment of sections
#   (which saves flash space).
# * linker argument `-Tlink.x` tells the linker to use `link.x`
#   as a linker script.
#   This is usually provided by the `cortex-m-rt` crate, and by default
#   the version in that crate will include a file called `memory.x`
#   which describes the particular memory layout for your specific chip.
# * linker argument `-Tdefmt.x` also tells the linker to use `defmt.x`
#   as a secondary linker script.
#   This is required to make `defmt_rtt` work.
# * no-vectorize-loops turns off the loop vectorizer (seeing as
#   the M0+ doesn't have SIMD).
linker = "flip-link"
rustflags = [
    "-C", "link-arg=--nmagic",
    "-C", "link-arg=-Tlink.x",
    "-C", "link-arg=-Tdefmt.x",
    "-C", "no-vectorize-loops",
]

# Use `probe-rs` for running the executable on the microcontroller.
runner = "probe-rs run --chip ${CHIP} --protocol swd"

# Alternative to use `picotool` for loading.
#
# Load an elf, skipping unchanged flash sectors, verify it, and execute it.
#runner = "${PICOTOOL_PATH} load -u -v -x -t elf"


#---------------------------------------------------------------
# Environment
#---------------------------------------------------------------

[env]
DEFMT_LOG = "debug"
